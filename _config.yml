# Site settings
title: Aki # site title
description: >- # site description
  He's writing in Bahasa about web technology and experience as a journal 
  for documentation things that he learned, meet him <a href="https://github.com/piharpi" target="_blank" rel="noopener">@github</a>.
lang: en-US # default lang
timezone: Asia/Tokyo # set your timezone
image: assets/img/avtar.jpeg # This image used for Open Graph more info https://ogp.me/
repo: https://github.com/akshaydp7 # site repo [optional]
mode: dark # default theme "dark" | "light"

# Profile settings
author:
  name: Aki # author name
  bio: >- # tell to the world
    Software Engineer | Distributed System Architect | Machine Learning Manager
  username: aki # general username
  github: akshaydp7 # github username
  twitter: akshaydp7 # twitter username
  facebook: aki # facebook username
  email: test@email.com # email adress
  avatar: /assets/img/avtar.jpeg # change with your own avatar

# URL settings
url: "https://akshay.puntambekar.me" #
baseurl:
permalink: /:title/
google_analytics: # leave it blank if not wish
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Homepage limit posts
number_of_posts: 5

# Build settings
# theme: klise
sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - lighthouse.png
  - klise-*.gem
  - klise.gemspec

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-postfiles
